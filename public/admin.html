<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Compassionate Heart Housing Solutions</title>
  <link rel="stylesheet" href="/styles.css">
</head>

<body>

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="brand">
      <img src="/images/logo.jpeg" class="main-logo" alt="Compassionate Heart Housing Solutions Logo">
    </a>

    <nav class="main-nav">
      <a href="/">Website</a>
      <a href="/apply.html">Application</a>
      <a href="/portal.html">Portal</a>
      <a href="/contact.html">Contact</a>
    </nav>
  </div>
</header>

<section class="apply-hero">
  <h1>Admin Dashboard</h1>
  <p>Manage housing applications, applicant status, and referrals.</p>
</section>

<main class="section">

  <div class="apply-card">
    <h2>Admin Access</h2>

    <label>Admin Password</label>
    <input class="input" type="password" id="adminPassword" placeholder="Enter admin password">

    <div class="button-group">
      <button class="form-btn" onclick="loadApplications()">Load Applications</button>
      <button class="form-btn secondary" onclick="downloadCSV()">Download CSV</button>
    </div>

    <div id="adminMessage"></div>
  </div>

  <div class="service-grid" style="margin-top:30px;">
    <div class="service-card">
      <div class="service-card-body">
        <h3>Total Applications</h3>
        <p class="admin-number" id="totalCount">0</p>
      </div>
    </div>

    <div class="service-card">
      <div class="service-card-body">
        <h3>Pending Review</h3>
        <p class="admin-number" id="pendingCount">0</p>
      </div>
    </div>

    <div class="service-card">
      <div class="service-card-body">
        <h3>Urgent</h3>
        <p class="admin-number" id="urgentCount">0</p>
      </div>
    </div>
  </div>

  <div class="apply-card" style="margin-top:30px;">
    <h2>Application Tools</h2>

    <label>Search Applicants</label>
    <input class="input" id="searchBox" placeholder="Search by name, phone, email, housing need..." oninput="renderApplications()">

    <label>Filter by Status</label>
    <select class="input" id="statusFilter" onchange="renderApplications()">
      <option value="">All Applications</option>
      <option value="Pending Review">Pending Review</option>
      <option value="Routine">Routine</option>
      <option value="Soon">Soon</option>
      <option value="Urgent">Urgent</option>
      <option value="Approved">Approved</option>
      <option value="Waitlisted">Waitlisted</option>
      <option value="Denied">Denied</option>
    </select>
  </div>

  <div class="dashboard-card" style="margin-top:30px; overflow-x:auto;">
    <h2>Applications</h2>

    <table class="admin-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Name</th>
          <th>Phone</th>
          <th>Email</th>
          <th>Housing Need</th>
          <th>Status</th>
          <th>View</th>
        </tr>
      </thead>
      <tbody id="applicationsBody">
        <tr>
          <td colspan="7">No applications loaded yet.</td>
        </tr>
      </tbody>
    </table>
  </div>

</main>

<div id="applicationModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:9999; overflow:auto;">
  <div class="apply-card" style="max-width:900px; margin:40px auto;">
    <button class="form-btn secondary" onclick="closeModal()">Close</button>
    <button class="form-btn" onclick="printApplication()">Print</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
let savedPassword = "";
let applications = [];

async function loadApplications() {
  const password = document.getElementById("adminPassword").value.trim();
  const message = document.getElementById("adminMessage");

  if (!password) {
    message.innerHTML = "<p class='notice'>Enter your admin password first.</p>";
    return;
  }

  savedPassword = password;

  try {
    const res = await fetch("/api/submissions?password=" + encodeURIComponent(password));
    const data = await res.json();

    if (!res.ok) {
      message.innerHTML = "<p class='notice'>Wrong password or access denied.</p>";
      return;
    }

    applications = data;
    renderApplications();
    updateCounts();
    message.innerHTML = "<p class='notice'>Applications loaded successfully.</p>";

  } catch (error) {
    message.innerHTML = "<p class='notice'>Could not load applications.</p>";
  }
}

function updateCounts() {
  document.getElementById("totalCount").textContent = applications.length;
  document.getElementById("pendingCount").textContent = applications.filter(app => !app.status || app.status === "Pending Review").length;
  document.getElementById("urgentCount").textContent = applications.filter(app => app.status === "Urgent").length;
}

function renderApplications() {
  const tbody = document.getElementById("applicationsBody");
  const search = (document.getElementById("searchBox")?.value || "").toLowerCase();
  const filter = document.getElementById("statusFilter")?.value || "";

  let filtered = applications.filter(app => {
    const status = app.status || "Pending Review";
    const searchable = [
      app.fullName,
      app.phone,
      app.email,
      app.housingNeed,
      app.status,
      app.caseManagerName
    ].join(" ").toLowerCase();

    return searchable.includes(search) && (!filter || status === filter);
  });

  if (!filtered.length) {
    tbody.innerHTML = "<tr><td colspan='7'>No matching applications found.</td></tr>";
    return;
  }

  tbody.innerHTML = "";

  filtered.forEach((app, index) => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${app.submittedAt ? new Date(app.submittedAt).toLocaleDateString() : "—"}</td>
      <td>${app.fullName || "No name"}</td>
      <td>${app.phone || "No phone"}</td>
      <td>${app.email || "No email"}</td>
      <td>${app.housingNeed || "Not listed"}</td>
      <td><span class="admin-status">${app.status || "Pending Review"}</span></td>
      <td><button class="form-btn" onclick="viewApplication('${app.id}')">View</button></td>
    `;

    tbody.appendChild(row);
  });
}

function viewApplication(id) {
  const app = applications.find(item => item.id === id);
  if (!app) return;

  const modal = document.getElementById("applicationModal");
  const content = document.getElementById("modalContent");

  content.innerHTML = `
    <h2>Application Details</h2>

    <p><strong>Application ID:</strong> ${app.id || "Not listed"}</p>
    <p><strong>Submitted:</strong> ${app.submittedAt ? new Date(app.submittedAt).toLocaleString() : "Not listed"}</p>

    <hr>

    <h3>Applicant Information</h3>
    <p><strong>Name:</strong> ${app.fullName || "Not listed"}</p>
    <p><strong>Date of Birth:</strong> ${app.dateOfBirth || "Not listed"}</p>
    <p><strong>Phone:</strong> ${app.phone || "Not listed"}</p>
    <p><strong>Email:</strong> ${app.email || "Not listed"}</p>
    <p><strong>Current Location:</strong> ${app.currentLocation || "Not listed"}</p>
    <p><strong>Move-In Date:</strong> ${app.moveInDate || "Not listed"}</p>

    <hr>

    <h3>Income & Eligibility</h3>
    <p><strong>Income Source:</strong> ${Array.isArray(app.incomeSource) ? app.incomeSource.join(", ") : app.incomeSource || "Not listed"}</p>
    <p><strong>Monthly Income:</strong> ${app.monthlyIncome || "Not listed"}</p>
    <p><strong>Proof of Income:</strong> ${app.proofOfIncome || "Not listed"}</p>

    <hr>

    <h3>Housing Needs</h3>
    <p><strong>Housing Need:</strong> ${app.housingNeed || "Not listed"}</p>
    <p><strong>Status/Urgency:</strong> ${app.status || "Pending Review"}</p>
    <p><strong>Description:</strong> ${app.housingDescription || "Not listed"}</p>
    <p><strong>Notes:</strong> ${app.notes || "Not listed"}</p>

    <hr>

    <h3>Emergency Contact / Referral</h3>
    <p><strong>Emergency Contact:</strong> ${app.emergencyContact || "Not listed"}</p>
    <p><strong>Emergency Phone:</strong> ${app.emergencyPhone || "Not listed"}</p>
    <p><strong>Case Manager / Referrer:</strong> ${app.caseManagerName || "Not listed"}</p>
    <p><strong>Case Manager Email:</strong> ${app.caseManagerEmail || "Not listed"}</p>

    <hr>

    <h3>Signature</h3>
    ${app.signatureData ? `<img src="${app.signatureData}" style="max-width:100%; border:1px solid #ddd; border-radius:12px;">` : "<p>No signature saved.</p>"}
  `;

  modal.style.display = "block";
}

function closeModal() {
  document.getElementById("applicationModal").style.display = "none";
}

function printApplication() {
  window.print();
}

function downloadCSV() {
  const password = savedPassword || document.getElementById("adminPassword").value.trim();

  if (!password) {
    alert("Enter your admin password first.");
    return;
  }

  window.location.href = "/api/submissions.csv?password=" + encodeURIComponent(password);
}
</script>

</body>
</html>
