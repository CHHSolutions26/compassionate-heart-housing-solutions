<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | Compassionate Heart Housing Solutions</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    :root{--admin-navy:#0d2a7a;--admin-purple:#8b5cf6;--admin-pink:#d946ef;--admin-soft:#f4edff;--admin-card:#fff;--admin-text:#1f2937;--admin-muted:#6b7280;--admin-border:#e5e7eb;--admin-shadow:0 14px 35px rgba(31,41,55,.12);--admin-radius:24px}
    .admin-shell{width:min(1180px,92%);margin:0 auto;padding:30px 0 70px}
    .admin-panel{background:var(--admin-card);border-radius:var(--admin-radius);box-shadow:var(--admin-shadow);padding:28px;margin-bottom:26px}
    .admin-panel h2{margin:0 0 18px;color:var(--admin-navy);font-size:clamp(28px,5vw,52px);line-height:1.05}
    .admin-panel h3{margin:0 0 12px;color:var(--admin-navy)}
    .admin-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin:24px 0}
    .stat-card{background:#fff;border-radius:22px;padding:24px;box-shadow:var(--admin-shadow);text-align:center;border:1px solid rgba(139,92,246,.14)}
    .stat-card h3{font-size:18px;margin-bottom:14px}.stat-card .number{font-size:44px;font-weight:800;color:#64748b}
    .admin-actions{display:grid;grid-template-columns:1fr 1fr;gap:14px}.admin-tools{display:grid;grid-template-columns:1.4fr .8fr;gap:16px;align-items:end}
    .admin-label{display:block;margin:16px 0 8px;font-weight:700;color:var(--admin-text)}
    .admin-input,.admin-select,.admin-textarea{width:100%;box-sizing:border-box;border:1px solid var(--admin-border);border-radius:18px;padding:16px 18px;font-size:16px;background:#fff;color:var(--admin-text)}
    .admin-textarea{min-height:110px;resize:vertical}
    .admin-btn{width:100%;border:0;border-radius:999px;padding:16px 22px;font-weight:800;font-size:16px;color:#fff;cursor:pointer;background:linear-gradient(135deg,var(--admin-purple),var(--admin-pink));box-shadow:0 10px 22px rgba(139,92,246,.25)}
    .admin-btn.secondary{background:#eef2ff;color:var(--admin-navy);box-shadow:none}.admin-btn.small{padding:10px 14px;font-size:14px;width:auto}
    .notice{margin:16px 0 0;padding:14px 16px;border-radius:16px;background:#f5f3ff;color:var(--admin-navy);font-weight:700}
    .app-list{display:grid;gap:16px}.app-card{background:#fff;border:1px solid rgba(139,92,246,.16);border-radius:22px;box-shadow:0 10px 28px rgba(31,41,55,.08);padding:20px;display:grid;grid-template-columns:1.2fr .8fr auto;gap:16px;align-items:center}
    .app-card h3{margin:0 0 8px;color:var(--admin-navy);font-size:22px}.app-meta{color:var(--admin-muted);line-height:1.55;font-size:15px}
    .status-pill{display:inline-block;border-radius:999px;padding:8px 12px;font-weight:800;font-size:13px;background:#fef3c7;color:#92400e;margin-bottom:8px}
    .status-Urgent{background:#fee2e2;color:#991b1b}.status-Approved{background:#dcfce7;color:#166534}.status-Waitlisted{background:#e0e7ff;color:#3730a3}.status-Denied{background:#f3f4f6;color:#374151}.status-Moved-In{background:#dbeafe;color:#1e40af}.status-Documents-Needed{background:#ffedd5;color:#9a3412}.status-Interview-Scheduled{background:#ccfbf1;color:#115e59}
    .modal{display:none;position:fixed;inset:0;background:rgba(17,24,39,.72);z-index:9999;overflow:auto;padding:22px}.modal-card{background:#fff;border-radius:26px;box-shadow:0 20px 50px rgba(0,0,0,.25);width:min(960px,100%);margin:20px auto;padding:26px}.modal-top{display:flex;gap:12px;justify-content:flex-end;flex-wrap:wrap;margin-bottom:16px}
    .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:20px}.detail-box{border:1px solid var(--admin-border);border-radius:20px;padding:18px;background:#fff}.detail-box p{margin:8px 0;line-height:1.5}.status-buttons{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0}.timeline{margin-top:12px;border-left:4px solid #ddd6fe;padding-left:16px}.timeline-item{margin:0 0 16px;padding:12px;border-radius:16px;background:#f8fafc}.timeline-item strong{color:var(--admin-navy)}
    @media(max-width:850px){.admin-grid,.admin-tools,.admin-actions,.detail-grid,.status-buttons{grid-template-columns:1fr}.app-card{grid-template-columns:1fr}.admin-panel{padding:22px 18px}.admin-shell{width:94%;padding-top:20px}.modal{padding:10px}.modal-card{padding:18px;border-radius:22px}.admin-btn.small{width:100%}}
    @media print{header,.apply-hero,.admin-shell>.admin-panel:not(.print-area),.modal-top{display:none!important}.modal{position:static;display:block!important;background:#fff;padding:0}.modal-card{box-shadow:none;margin:0;width:100%}}
  </style>
</head>
<body>
<header class="site-header"><div class="header-inner"><a href="/" class="brand"><img src="/images/logo.jpeg" class="main-logo" alt="Compassionate Heart Housing Solutions Logo"></a><nav class="main-nav"><a href="/">Website</a><a href="/apply.html">Application</a><a href="/portal.html">Portal</a><a href="/contact.html">Contact</a></nav></div></header>
<section class="apply-hero"><h1>Admin Dashboard</h1><p>Manage housing applications, applicant status, case notes, and portal messages.</p></section>
<main class="admin-shell">
<section class="admin-panel"><h2>Admin Access</h2><label class="admin-label">Admin Password</label><input class="admin-input" type="password" id="adminPassword" placeholder="Enter admin password"><div class="admin-actions" style="margin-top:18px;"><button class="admin-btn" onclick="loadApplications()">Load Applications</button><button class="admin-btn secondary" onclick="downloadCSV()">Download CSV</button></div><div id="adminMessage"></div></section>
<section class="admin-grid"><div class="stat-card"><h3>Total Applications</h3><div class="number" id="totalCount">0</div></div><div class="stat-card"><h3>Pending Review</h3><div class="number" id="pendingCount">0</div></div><div class="stat-card"><h3>Urgent</h3><div class="number" id="urgentCount">0</div></div><div class="stat-card"><h3>Approved</h3><div class="number" id="approvedCount">0</div></div></section>
<section class="admin-panel"><h2>Application Tools</h2><div class="admin-tools"><div><label class="admin-label">Search Applicants</label><input class="admin-input" id="searchBox" placeholder="Search by name, phone, email, housing need..." oninput="renderApplications()"></div><div><label class="admin-label">Filter by Status</label><select class="admin-select" id="statusFilter" onchange="renderApplications()"><option value="">All Applications</option><option value="Pending Review">Pending Review</option><option value="Urgent">Urgent</option><option value="Documents Needed">Documents Needed</option><option value="Interview Scheduled">Interview Scheduled</option><option value="Approved">Approved</option><option value="Waitlisted">Waitlisted</option><option value="Denied">Denied</option><option value="Moved In">Moved In</option></select></div></div></section>
<section class="admin-panel"><h2>Applications</h2><div class="app-list" id="applicationsBody"><div class="notice">No applications loaded yet.</div></div></section>
</main>
<div id="applicationModal" class="modal"><div class="modal-card print-area"><div class="modal-top"><button class="admin-btn secondary small" onclick="closeModal()">Close</button><button class="admin-btn secondary small" onclick="printApplication()">Print</button><button class="admin-btn small" onclick="saveCaseUpdate()">Save Changes</button></div><div id="modalContent"></div></div></div>
<script>
let savedPassword="",applications=[],selectedApplicationId="";
const statusOptions=["Pending Review","Urgent","Documents Needed","Interview Scheduled","Approved","Waitlisted","Denied","Moved In"];
function safe(value){return String(value??"").replace(/[&<>"']/g,char=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[char]));}
function statusClass(status){return "status-"+String(status||"Pending Review").replace(/\s+/g,"-");}
async function loadApplications(){const password=document.getElementById("adminPassword").value.trim(),message=document.getElementById("adminMessage");if(!password){message.innerHTML="<p class='notice'>Enter your admin password first.</p>";return}savedPassword=password;try{const res=await fetch("/api/submissions?password="+encodeURIComponent(password)+"&v="+Date.now()),data=await res.json();if(!res.ok){message.innerHTML="<p class='notice'>Wrong password or access denied.</p>";return}applications=Array.isArray(data)?data:[];renderApplications();updateCounts();message.innerHTML="<p class='notice'>Applications loaded successfully.</p>"}catch(error){message.innerHTML="<p class='notice'>Could not load applications.</p>"}}
function updateCounts(){document.getElementById("totalCount").textContent=applications.length;document.getElementById("pendingCount").textContent=applications.filter(app=>!app.status||app.status==="Pending Review").length;document.getElementById("urgentCount").textContent=applications.filter(app=>app.status==="Urgent").length;document.getElementById("approvedCount").textContent=applications.filter(app=>app.status==="Approved").length}
function renderApplications(){const container=document.getElementById("applicationsBody"),search=(document.getElementById("searchBox")?.value||"").toLowerCase(),filter=document.getElementById("statusFilter")?.value||"";let filtered=applications.filter(app=>{const status=app.status||"Pending Review",searchable=[app.fullName,app.phone,app.email,app.housingNeed,status,app.caseManagerName,app.portalMessage,app.staffNote].join(" ").toLowerCase();return searchable.includes(search)&&(!filter||status===filter)});if(!filtered.length){container.innerHTML="<div class='notice'>No matching applications found.</div>";return}container.innerHTML="";filtered.forEach(app=>{const status=app.status||"Pending Review",card=document.createElement("div");card.className="app-card";card.innerHTML=`<div><h3>${safe(app.fullName||"No name")}</h3><div class="app-meta"><strong>ID:</strong> ${safe(app.id||"Not listed")}<br><strong>Submitted:</strong> ${app.submittedAt?new Date(app.submittedAt).toLocaleString():"Not listed"}<br><strong>Housing Need:</strong> ${safe(app.housingNeed||"Not listed")}</div></div><div><span class="status-pill ${statusClass(status)}">${safe(status)}</span><div class="app-meta"><strong>Phone:</strong> ${safe(app.phone||"No phone")}<br><strong>Email:</strong> ${safe(app.email||"No email")}<br><strong>Case Manager:</strong> ${safe(app.caseManagerName||"Not assigned")}</div></div><div><button class="admin-btn small" onclick="viewApplication('${safe(app.id)}')">View / Manage</button></div>`;container.appendChild(card)})}
function viewApplication(id) {
    const app = applications.find(item => item.id === id);
    if (!app) return;

    selectedApplicationId = id;

    const modal = document.getElementById("applicationModal");
    const content = document.getElementById("modalContent");

    const currentStatus = app.status || "Pending Review";

    const buttons = statusOptions.map(status => `
        <button
            class="admin-btn ${status === currentStatus ? "" : "secondary"} small"
            onclick="setStatus('${status}')">
            ${status}
        </button>
    `).join("");

    const timeline = Array.isArray(app.timeline) && app.timeline.length
        ? app.timeline.map(item => `
            <div class="timeline-item">
                <strong>${safe(item.status || "Update")}</strong><br>
                <small>${item.date ? new Date(item.date).toLocaleString() : ""}</small>
                <p>${safe(item.note || "")}</p>
            </div>
        `).join("")
        : "<p>No timeline updates yet.</p>";

    content.innerHTML = `
        <h2>${safe(app.fullName || "Application Details")}</h2>

        <p><strong>Application ID:</strong> ${safe(app.id || "")}</p>
        <p><strong>Submitted:</strong> ${app.submittedAt ? new Date(app.submittedAt).toLocaleString() : ""}</p>

        <div class="detail-box">
            <h3>Case Manager Controls</h3>

            <label class="admin-label">Status</label>
            <div class="status-buttons">${buttons}</div>

            <input type="hidden" id="editStatus" value="${safe(currentStatus)}">

            <label class="admin-label">Assigned Case Manager</label>
            <input
                class="admin-input"
                id="editCaseManager"
                value="${safe(app.caseManagerName || "")}"
                placeholder="Case manager name">

            <label class="admin-label">Message for Applicant Portal</label>
            <textarea
                class="admin-textarea"
                id="editPortalMessage"
                placeholder="Message applicant will see in portal">${safe(app.portalMessage || "")}</textarea>
        </div>

        <div class="detail-box">
            <h3>Timeline</h3>
            <div class="timeline">${timeline}</div>
        </div>
    `;

    modal.style.display = "block";
}
function setStatus(status){const input=document.getElementById("editStatus");if(input)input.value=status;const app=applications.find(item=>item.id===selectedApplicationId);if(app){app.status=status;viewApplication(selectedApplicationId)}}
async function saveCaseUpdate() {
  try {
    const password = savedPassword || document.getElementById("adminPassword").value.trim();
    const app = applications.find(item => item.id === selectedApplicationId);

    if (!password || !app) {
      alert("Load applications first.");
      return;
    }

    const payload = {
      id: selectedApplicationId,
      status: document.getElementById("editStatus").value,
      portalMessage: document.getElementById("editPortalMessage").value,
      staffNote: "Application updated",
      caseManagerName: document.getElementById("editCaseManager").value
    };

    const res = await fetch("/api/admin/update?password=" + encodeURIComponent(password), {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.error || "Update failed.");
      return;
    }

    const index = applications.findIndex(item => item.id === selectedApplicationId);
    if (index !== -1) applications[index] = data.application;

    updateCounts();
    renderApplications();
    viewApplication(selectedApplicationId);

    alert("Application updated successfully.");
  } catch (error) {
    console.error(error);
    alert("Update failed.");
  }
}
function closeModal(){document.getElementById("applicationModal").style.display="none"}function printApplication(){window.print()}function downloadCSV(){const password=savedPassword||document.getElementById("adminPassword").value.trim();if(!password){alert("Enter your admin password first.");return}window.location.href="/api/submissions.csv?password="+encodeURIComponent(password)}
</script>
</body>
</html>
