<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CHHS Admin Dashboard</title><link rel="stylesheet" href="/styles.css"></head><body><header class="nav"><a class="brand" href="/"><img src="/images/logo.jpeg"><span>CHHS<small>Admin Dashboard</small></span></a><a class="btn" href="/">Website</a></header><main class="section"><h1>Application Submissions</h1><p>Enter your admin password from Render environment variables.</p><div class="admin-controls"><input class="input" id="pass" placeholder="Admin password" style="max-width:340px"><button class="btn" onclick="loadData()">Load Submissions</button><button class="btn secondary" onclick="downloadCsv()">Download CSV</button></div><div id="out"></div></main><script>
async function loadData(){const p=document.getElementById('pass').value; const res=await fetch('/api/submissions?password='+encodeURIComponent(p)); if(!res.ok){out.innerHTML='<div class="notice">Wrong password or no access.</div>'; return;} const data=await res.json(); if(!data.length){out.innerHTML='<div class="notice">No submissions yet.</div>'; return;} out.innerHTML='<table class="admin-table"><thead><tr><th>Date</th><th>Name</th><th>Phone</th><th>Email</th><th>Income</th><th>Status</th></tr></thead><tbody>'+data.map(x=>`<tr><td>${new Date(x.submittedAt).toLocaleString()}</td><td>${x.fullName||''}</td><td>${x.phone||''}</td><td>${x.email||''}</td><td>${x.monthlyIncome||''}</td><td>${x.status||''}</td></tr>`).join('')+'</tbody></table>';}
function downloadCsv(){const p=document.getElementById('pass').value; location.href='/api/submissions.csv?password='+encodeURIComponent(p);}
</script></body></html>
