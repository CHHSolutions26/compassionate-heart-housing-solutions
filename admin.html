<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHHS Admin Dashboard</title>
<link rel="stylesheet" href="/styles.css">
</head>

<body>

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="brand">
      <img src="/images/logo.jpeg" class="main-logo" alt="CHHS Logo">
    </a>

    <nav class="main-nav">
      <a href="/">Website</a>
      <a href="/apply.html">Application</a>
      <a href="/contact.html">Contact</a>
    </nav>
  </div>
</header>

<section class="apply-hero">
  <h1>Admin Dashboard</h1>
  <p>View submitted housing applications.</p>
</section>

<main class="section">

  <div class="form-wrap">
    <h2>Admin Login</h2>

    <label>Admin Password</label>
    <input class="input" id="adminPassword" type="password" placeholder="Enter admin password">

    <button class="btn" onclick="loadApplications()">Load Applications</button>
    <button class="btn secondary" onclick="downloadCSV()">Download CSV</button>

    <div id="adminMessage"></div>
  </div>

  <div class="apply-card" style="margin-top:40px;">
    <h2>Applications</h2>

    <table class="admin-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Name</th>
          <th>Phone</th>
          <th>Email</th>
          <th>Housing Need</th>
          <th>Status</th>
          <th>View</th>
        </tr>
      </thead>

      <tbody id="applicationsBody">
        <tr>
          <td colspan="7">No applications loaded yet.</td>
        </tr>
      </tbody>
    </table>
  </div>

</main>

<footer class="site-footer">
  <h3>Compassionate Heart Housing Solutions</h3>
  <p>Housing with Compassion, Hope & Stability</p>
</footer>

<script>
let savedPassword = "";

async function loadApplications() {
  const password = document.getElementById("adminPassword").value.trim();
  const message = document.getElementById("adminMessage");
  const tbody = document.getElementById("applicationsBody");

  savedPassword = password;

  if (!password) {
    message.innerHTML = "<p class='notice'>Enter your admin password first.</p>";
    return;
  }

  try {
    const res = await fetch("/api/submissions?password=" + encodeURIComponent(password));
    const data = await res.json();

    if (!res.ok) {
      message.innerHTML = "<p class='notice'>Wrong password or access denied.</p>";
      return;
    }

    if (!data.length) {
      tbody.innerHTML = "<tr><td colspan='7'>No applications submitted yet.</td></tr>";
      message.innerHTML = "<p class='notice'>Connected successfully. No applications found.</p>";
      return;
    }

    tbody.innerHTML = "";

    data.forEach((app, index) => {
      const row = document.createElement("tr");

      row.innerHTML = `
        <td>${app.submittedAt ? new Date(app.submittedAt).toLocaleDateString() : "—"}</td>
        <td>${app.fullName || "No name"}</td>
        <td>${app.phone || "No phone"}</td>
        <td>${app.email || "No email"}</td>
        <td>${app.housingNeed || "Not listed"}</td>
        <td>${app.status || "Pending Review"}</td>
        <td><button class="form-btn" onclick="viewApplication(${index})">View</button></td>
      `;

      row.dataset.app = JSON.stringify(app);
      tbody.appendChild(row);
    });

    message.innerHTML = "<p class='notice'>Applications loaded successfully.</p>";

  } catch (error) {
    message.innerHTML = "<p class='notice'>Could not load applications.</p>";
  }
}

function viewApplication(index) {
  const row = document.querySelectorAll("#applicationsBody tr")[index];
  const app = JSON.parse(row.dataset.app);

  const details = `
APPLICATION DETAILS

Application ID: ${app.id || "Not listed"}
Submitted: ${app.submittedAt || "Not listed"}

Applicant Information
Name: ${app.fullName || "No name"}
Date of Birth: ${app.dateOfBirth || "Not listed"}
Phone: ${app.phone || "No phone"}
Email: ${app.email || "No email"}
Current Location: ${app.currentLocation || "Not listed"}
Preferred Move-In Date: ${app.moveInDate || "Not listed"}

Income & Eligibility
Income Source: ${app.incomeSource || "Not listed"}
Monthly Income: ${app.monthlyIncome || "Not listed"}
Proof of Income: ${app.proofOfIncome || "Not listed"}

Housing Needs
Housing Need: ${app.housingNeed || "Not listed"}
Urgency: ${app.status || "Not listed"}
Description: ${app.housingDescription || "Not listed"}
Notes: ${app.notes || "Not listed"}

Emergency / Referral
Emergency Contact: ${app.emergencyContact || "Not listed"}
Emergency Phone: ${app.emergencyPhone || "Not listed"}
Case Manager: ${app.caseManagerName || "Not listed"}
Case Manager Email: ${app.caseManagerEmail || "Not listed"}
`;

  alert(details);
}

function downloadCSV() {
  const password = document.getElementById("adminPassword").value.trim();

  if (!password) {
    alert("Enter your admin password first.");
    return;
  }

  window.location.href = "/api/submissions.csv?password=" + encodeURIComponent(password);
}
</script>

</body>
</html>
